# Dependabot config — weekly patch/minor bumps, grouped by ecosystem so we
# don't get spammed by 30 single-package PRs. Major bumps still open
# individual PRs so we can review breaking changes on their own.
version: 2
updates:
  # Next.js app deps
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      next-ecosystem:
        patterns:
          - "next"
          - "@next/*"
          - "react"
          - "react-dom"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"
      drizzle-ecosystem:
        patterns:
          - "drizzle-*"
          - "postgres"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/test"
          - "playwright"
        update-types:
          - "minor"
          - "patch"
      lucia-auth:
        patterns:
          - "lucia"
          - "@lucia-auth/*"
          - "oslo"
        update-types:
          - "minor"
          - "patch"

  # Dockerfile base image
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
      - "automated"
    commit-message:
      prefix: "deps(docker)"

  # GitHub Actions workflows (if/when we add any)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
      - "automated"
    commit-message:
      prefix: "deps(ci)"
