<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" role="img" aria-label="BreachLab">
  <defs>
    <linearGradient id="ph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <pattern id="sc" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#000" fill-opacity="0.3"/>
    </pattern>
    <filter id="gl">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="280" fill="#0a0a0a"/>
  <rect x="16" y="16" width="868" height="248" fill="none" stroke="#f59e0b" stroke-opacity="0.4"/>

  <!-- titlebar -->
  <rect x="16" y="16" width="868" height="34" fill="#f59e0b" fill-opacity="0.08"/>
  <line x1="16" y1="50" x2="884" y2="50" stroke="#f59e0b" stroke-opacity="0.35"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14">
    <text x="32" y="38" fill="#f59e0b" font-weight="700" letter-spacing="2">[BL]</text>
    <text x="78" y="38" fill="#c0c0c0" fill-opacity="0.6">~/breachlab — bash</text>
    <text x="868" y="38" fill="#c0c0c0" fill-opacity="0.4" text-anchor="end">tty0</text>
  </g>

  <!-- prompt + cursor lockup -->
  <g font-family="'Departure Mono', ui-monospace, monospace">
    <text x="36" y="170" font-size="68" font-weight="700" fill="#f59e0b" letter-spacing="2">$</text>
    <text x="92" y="170" font-size="92" font-weight="700" fill="url(#ph)" filter="url(#gl)" letter-spacing="-1">breach</text>
    <text x="430" y="170" font-size="92" font-weight="700" fill="#c0c0c0" letter-spacing="-1">lab</text>
    <!-- breach scar between "breach" and "lab" -->
    <line x1="412" y1="180" x2="430" y2="100" stroke="#fbbf24" stroke-width="2"/>
    <rect x="610" y="105" width="22" height="78" fill="#f59e0b">
      <animate attributeName="opacity" values="1;0;1" dur="1.05s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- tagline -->
  <g font-family="ui-monospace, monospace" font-size="16" letter-spacing="3">
    <text x="36" y="220" fill="#c0c0c0" fill-opacity="0.7">REAL SKILLS · REAL SCENARIOS · NO CTF BULLSHIT</text>
  </g>

  <!-- status -->
  <line x1="16" y1="240" x2="884" y2="240" stroke="#f59e0b" stroke-opacity="0.3"/>
  <g font-family="ui-monospace, monospace" font-size="12" letter-spacing="2">
    <text x="32" y="258" fill="#f59e0b" fill-opacity="0.85">● LIVE</text>
    <text x="98" y="258" fill="#c0c0c0" fill-opacity="0.5">13 TRACKS · GHOST · PHANTOM · 11 PENDING</text>
    <text x="868" y="258" fill="#c0c0c0" fill-opacity="0.5" text-anchor="end">breachlab.org</text>
  </g>

  <rect width="900" height="280" fill="url(#sc)" pointer-events="none"/>
</svg>
