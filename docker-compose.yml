services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # No defaults — startup must fail loudly if the env file is missing
      # rather than silently boot with the well-known "breachlab:breachlab"
      # credentials (which were also in the previous compose file as a
      # fallback and would have been a real risk if anything bypassed the
      # .env load order).
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    # Don't publish to the host — the web container reaches it via the
    # internal Docker network as `db:5432`. Removing the host port mapping
    # closes the "attacker with host shell connects to localhost:5432"
    # path while leaving normal container-to-container traffic intact.
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NODE_ENV: production
      # Specter per-player flag derivation. MUST equal the same env var
      # on specter-mgmt's compose — platform recomputes HMAC at /submit
      # and oracle mints at /verify; mismatch breaks the chain silently.
      # Rotation requires both sides to land the new value before any
      # in-flight session re-submits.
      SPECTER_FLAG_HMAC_SECRET: ${SPECTER_FLAG_HMAC_SECRET:?SPECTER_FLAG_HMAC_SECRET must be exported}
      # Bearer the Specter oracle uses to call /api/specter/auth-check
      # and /api/specter/resolve-token. Same value as on specter-mgmt.
      SPECTER_ORACLE_SECRET: ${SPECTER_ORACLE_SECRET:?SPECTER_ORACLE_SECRET must be exported}
      # Discord — OAuth (account linking) + bot (role sync, channel posts).
      # Without these the OAuth callback silently no-ops and linked
      # players never get the Operative baseline role (so #spoiler-zone
      # and other operative-only channels stay invisible). Caught
      # 2026-05-05 after I-baLL/ciabatta reported missing roles.
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_ROLE_OPERATIVE: ${DISCORD_ROLE_OPERATIVE}
      DISCORD_ROLE_SUPPORTER: ${DISCORD_ROLE_SUPPORTER}
      DISCORD_ROLE_FIRST_BLOOD: ${DISCORD_ROLE_FIRST_BLOOD}
      DISCORD_ROLE_GHOST_MASTER: ${DISCORD_ROLE_GHOST_MASTER}
      DISCORD_ROLE_PHANTOM_OPERATIVE: ${DISCORD_ROLE_PHANTOM_OPERATIVE}
      DISCORD_CHANNEL_VICTORIES: ${DISCORD_CHANNEL_VICTORIES}
      DISCORD_CHANNEL_ANNOUNCEMENTS: ${DISCORD_CHANNEL_ANNOUNCEMENTS}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    # Cross-stack bridge with the Specter oracle. Oracle calls back to
    # /api/specter/auth-check + /api/specter/resolve-token; that path
    # cannot go via public breachlab.org because the CF managed-
    # challenge layer rejects POST without a browser challenge solve
    # (same class as the email-resend challenge fix). Internal bridge
    # bypasses the CF edge entirely AND bypasses the public DNS need
    # (specter-oracle-net is internal:true, no egress). Only the
    # Specter oracle joins the platform side of this bridge — no other
    # specter-net containers reach platform.
    networks:
      default:
      breachlab-shared:
        aliases:
          - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  # Default bridge for web ↔ db ↔ caddy (created automatically per-stack
  # by docker-compose; declared here to keep `breachlab-shared` siblings
  # explicit).
  default:
  # Cross-stack bridge with Specter oracle. The Specter oracle attaches
  # to this network from its own compose file (declared external there)
  # and calls platform via the `web` alias on this network. Stays
  # bridge-only (no internet) — only platform's web service routes
  # traffic to/from the rest of the platform stack.
  breachlab-shared:
    name: breachlab-shared
    driver: bridge
